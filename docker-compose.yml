services:
  weather-frog:
    build: .
    ports:
      - "3000:3000"
    environment:
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - CACHE_DB_PATH=/data/cache.db
    volumes:
      - weather-cache:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  weather-cache:
